name: Brand Validation

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 8am UTC
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'tests/**'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  validate-brand:
    name: Run Brand Validation Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run brand validation tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: brand-validation-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: brand-screenshots-${{ github.run_number }}
          path: test-results/*.png
          retention-days: 30

      - name: Upload JSON results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: brand-results-json-${{ github.run_number }}
          path: test-results/results.json
          retention-days: 30

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Brand validation failed — ${new Date().toISOString().slice(0,10)}`,
              body: `Brand validation tests failed.\n\nSee [workflow run](${runUrl}) for details and screenshots.\n\n_Auto-created by brand-validation.yml_`,
              labels: ['brand', 'automated']
            });
