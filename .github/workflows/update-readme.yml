name: Update Dynamic Profile

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 6am UTC
  workflow_dispatch:        # Manual trigger

jobs:
  update-readme:
    name: Inject Dynamic Content
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.METRICS_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch dashboard metrics
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: node scripts/fetch-dashboard-metrics.js

      - name: Fetch top repos
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: node scripts/fetch-top-repos.js

      - name: Fetch recent activity
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: node scripts/fetch-recent-activity.js

      - name: Inject dynamic content into README
        run: node scripts/inject-readme.js

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(readme): auto-update dynamic sections [skip ci]"
            git push
          fi

  validate:
    name: Post-Update Validation
    needs: update-readme
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for GitHub to propagate
        run: sleep 30

      - name: Run post-update profile validation
        run: npx playwright test tests/brand-profile/ tests/brand-links/
        env:
          CI: true

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: post-update-validation
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      - name: Create issue on validation failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Post-update brand validation failed',
              body: `Dynamic README update succeeded but validation tests failed on ${new Date().toISOString()}.\n\nSee [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
              labels: ['brand', 'automated']
            });
