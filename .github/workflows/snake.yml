name: Generate Contribution Snake

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  generate-snake:
    name: Generate Snake Animation
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake animations
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: arvind3
          outputs: |
            assets/contributions-snake.svg?color_snake=58a6ff&color_dots[]=ebedf0,#9be9a8,#40c463,#30a14e,#216e39
            assets/contributions-snake-dark.svg?color_snake=58a6ff&color_dots[]=0d1117,#0d3b6e,#1a5f9e,#2380ce,#58a6ff

      - name: Commit snake assets
        uses: EndBug/add-and-commit@v9
        with:
          add: 'assets/contributions-snake*.svg'
          message: 'chore(profile): regenerate contribution snake'
          default_author: github_actions
