name: Generate Metrics

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    name: Generate GitHub Metrics
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Base metrics: header, activity, community, repos, metadata + topics
      - name: Generate base metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: arvind3
          template: classic
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          config_timezone: America/Chicago
          config_output: svg
          filename: assets/github-metrics.svg
          repositories_forks: no
          repositories_affiliations: owner
          plugin_topics: yes
          plugin_topics_limit: 12
          plugin_topics_mode: mastered

      # Language breakdown
      - name: Generate language metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: arvind3
          template: classic
          base: ""
          config_timezone: America/Chicago
          config_output: svg
          filename: assets/metrics-languages.svg
          plugin_languages: yes
          plugin_languages_ignored: html, css, makefile, cmake, dockerfile
          plugin_languages_limit: 10
          plugin_languages_details: bytes-size, percentage
          plugin_languages_indepth: yes
          plugin_languages_categories: markup, programming

      # Recent activity timeline
      - name: Generate activity metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: arvind3
          template: classic
          base: ""
          config_timezone: America/Chicago
          config_output: svg
          filename: assets/metrics-activity.svg
          plugin_activity: yes
          plugin_activity_limit: 7
          plugin_activity_days: 30
          plugin_activity_filter: push, issue, pr, release, review, ref/create

      # Contribution calendar heatmap (full year)
      - name: Generate isocalendar metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: arvind3
          template: classic
          base: ""
          config_timezone: America/Chicago
          config_output: svg
          filename: assets/metrics-isocalendar.svg
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
